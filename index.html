    return { ...f, facilityContacts: c };
  });

  const textareaStyle = { ...inputStyle, resize: "vertical" };

  const inp = (label, key, placeholder = "", type = "text") => (
    <div style={{ marginBottom: 14 }}>
      <label style={labelStyle}>{label}</label>
      <input type={type} value={form[key]} onChange={e => set(key, e.target.value)} placeholder={placeholder} style={inputStyle} />

  );

    <div style={{ marginBottom: 14 }}>
      <label style={labelStyle}>{label}</label>
      <textarea value={form[key]} onChange={e => set(key, e.target.value)} rows={rows} style={textareaStyle} />

        return (i + 1) + ". " + name + title + phone;

        {inp("Client Name", "clientName", "e.g. ABC Corporation")}
        {inp("Post Name / Post Number", "postName", "e.g. Main Lobby – Post 1")}
        {inp("Post Location", "postLocation", "e.g. 1st Floor, Main Entrance")}
        {inp("Shift Hours", "shiftHours", "e.g. 0600–1800")}
        {inp("Effective Date", "effectiveDate", "", "date")}
      </div>
    );
    if (step === 2) return (
      <div>
        {secHead("Post Objective")}
        {ta("Objectives", "objectives", 2)}
        {ta("Standards", "standards", 2)}
        {ta("Expectations", "expectations", 2)}
        {secHead("Facility Personnel Contacts")}
        {form.facilityContacts.map((c, i) => (
          <div key={i} style={{ background: "#F5F5F5", border: "1px solid #D5D5D5", borderRadius: 6, padding: 14, marginBottom: 10 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <span style={{ fontSize: 12, fontWeight: 700, color: "#141414", textTransform: "uppercase", letterSpacing: "0.05em" }}>Contact {i + 1}</span>
              {i > 0 && <button onClick={() => removeContact(i)} style={{ background: "none", border: "none", color: "#939598", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>✕ Remove</button>}
            </div>
            {["name", "title", "phone"].map(k => (
              <input key={k} placeholder={k.charAt(0).toUpperCase() + k.slice(1)} value={c[k]}
                onChange={e => setContact(i, k, e.target.value)}
                style={{ ...inputStyle, marginBottom: 8 }} />
            ))}
          </div>
        ))}
        <button onClick={addContact} style={{ background: "#141414", color: "#D7B343", border: "none", borderRadius: 4, padding: "9px 18px", cursor: "pointer", fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em" }}>+ Add Contact</button>
      </div>
    );
    if (step === 3) return (
      <div>
        {secHead("Site & Building Information")}
        {ta("Buildings / Areas Covered", "buildingAreas", 2)}
        {ta("Restricted Areas", "restrictedAreas", 2)}
        {ta("Alarm Panels / Security Systems", "alarmSystems", 2)}
        {ta("CCTV Monitoring Areas", "cctvAreas", 2)}
        {inp("Site Address", "siteAddress", "Full address")}
      </div>
    );
    if (step === 4) return (
      <div>
        {secHead("Start of Shift")}
        {inp("Report to Post By", "reportTo", "e.g. 0550")}
        {inp("Sign In Via", "signIn", "e.g. Guard Tour System / Timekeeping App")}
        {secHead("Post Duties")}
        {ta("Patrol Routes", "patrolRoutes", 2)}
        {inp("Patrol Frequency", "patrolFrequency", "e.g. Every 2 hours")}
        {ta("Access Control Procedures", "accessControl", 2)}
        {ta("Visitor / Contractor Handling", "visitorHandling", 2)}
        {ta("Reporting Requirements", "reportingRequirements", 2)}
        {secHead("Required Equipment")}
        {ta("Equipment List", "requiredEquipment", 3)}
      </div>
    );
    if (step === 5) return (
      <div>
        {secHead("Site-Specific Orders & Final Notes")}
        {ta("Special Instructions", "specialInstructions", 3)}
        {ta("Prohibited Actions", "prohibitedActions", 3)}
        {ta("Additional Notes", "additionalNotes", 3)}
        <div style={{ background: "#F5F5F5", border: "1px solid #D7B343", borderLeft: "4px solid #D7B343", borderRadius: 4, padding: 14, marginTop: 16 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#141414", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 4 }}>Ready to Generate</div>
          <p style={{ fontSize: 12, margin: 0, color: "#939598", lineHeight: 1.5 }}>Click "Generate Post Orders" to preview, print, or download as a Word document.</p>
        </div>
      </div>
    );
  };

  const PreviewDoc = () => {
    const f = form;
    const contacts = getContacts(f);

    const row = (label, val) => val ? (
      <div style={{ marginBottom: 8 }}>
        <span style={{ fontWeight: 700, fontSize: 12, textTransform: "uppercase", letterSpacing: "0.06em", color: "#141414" }}>{label}: </span>
        <span style={{ fontSize: 13, color: "#141414", whiteSpace: "pre-wrap" }}>{val}</span>
      </div>
    ) : null;

    const section = (num, title, children) => (
      <div style={{ marginBottom: 24, pageBreakInside: "avoid" }}>
        <div style={{ background: "#141414", color: "#D7B343", padding: "6px 14px", fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ opacity: 0.6, fontSize: 10 }}>{num}</span> {title}
        </div>
        <div style={{ padding: "0 4px" }}>{children}</div>
      </div>
    );

    const bul = (items) => (
      <ul style={{ margin: "4px 0 0 0", paddingLeft: 20 }}>
        {items.map((item, i) => <li key={i} style={{ fontSize: 13, color: "#141414", marginBottom: 4, lineHeight: 1.5 }}>{item}</li>)}
      </ul>
    );

    return (
      <div style={{ fontFamily: "Arial, sans-serif", maxWidth: 660, margin: "0 auto", background: "#fff" }}>
        <style>{`@media print { .no-print { display: none !important; } body { margin: 0; } }`}</style>
        <div className="no-print" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 20px", background: "#F5F5F5", borderBottom: "1px solid #D5D5D5" }}>
          <button onClick={() => setPreview(false)} style={{ background: "#141414", color: "#D7B343", border: "none", borderRadius: 4, padding: "8px 16px", cursor: "pointer", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em" }}>← Edit</button>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={downloadDoc} style={{ background: "#141414", color: "#D7B343", border: "none", borderRadius: 4, padding: "8px 18px", cursor: "pointer", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em" }}>⬇ Download .doc</button>
            <button onClick={() => window.print()} style={{ background: "#D7B343", color: "#141414", border: "none", borderRadius: 4, padding: "8px 18px", cursor: "pointer", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em" }}>🖨 Print / Save PDF</button>
          </div>
        </div>
        <div style={{ padding: "28px 32px" }}>
          <div style={{ background: "#141414", borderTop: "4px solid #D7B343", borderBottom: "4px solid #D7B343", padding: "16px 20px", marginBottom: 24, textAlign: "center" }}>
            <img src={"data:image/png;base64," + FULL_LOGO} alt="Citadel Security" style={{ height: 32, display: "block", margin: "0 auto 8px" }} />
            <div style={{ color: "#D7B343", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.18em" }}>Post Orders — Site Specific</div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "6px 24px", marginBottom: 24, padding: "14px 16px", background: "#F5F5F5", border: "1px solid #D5D5D5", borderRadius: 4 }}>
            {[["Site Name", f.siteName], ["Client Name", f.clientName], ["Post Name / Number", f.postName], ["Post Location", f.postLocation], ["Shift Hours", f.shiftHours], ["Effective Date", f.effectiveDate]].map(([l, v]) => (
              <div key={l}><span style={{ fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", color: "#939598" }}>{l}</span><div style={{ fontSize: 13, color: "#141414", fontWeight: 600, marginTop: 2 }}>{v || "—"}</div></div>
            ))}
          </div>
          {section("01", "Post Objective", <div>{row("Objectives", f.objectives)}{row("Standards", f.standards)}{row("Expectations", f.expectations)}</div>)}
          {section("02", "Site Contacts", <div>
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", color: "#939598", marginBottom: 6 }}>Citadel Management</div>
              <div style={{ fontSize: 13, color: "#141414", lineHeight: 1.8 }}>Front Range Regional Office: 720.303.3750<br />Office Hours: Mon–Fri 8:00AM–4:00PM<br />1. Heather Jordan, Operations Manager – 720.415.1208<br />2. Mark Rice, Operations Manager – 720.661.6405<br />3. Brent Jagger, VP of Operations – 970.314.4185</div>
            </div>
            {f.facilityContacts.some(c => c.name) && <div>
              <div style={{ fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", color: "#939598", marginBottom: 6 }}>Facility Personnel</div>
              <div style={{ fontSize: 13, color: "#141414", lineHeight: 1.8, whiteSpace: "pre-wrap" }}>{contacts}</div>
            </div>}
          </div>)}
          {section("03", "Chain of Escalation", <div>
            <div style={{ fontSize: 12, color: "#939598", marginBottom: 8, fontStyle: "italic" }}>Follow this order unless life safety is at risk:</div>
            {bul(["On-Duty Supervisor / Lead Officer", "Operations / Account Manager", "Client Representative", "Emergency Services (911)"])}
            <div style={{ marginTop: 12, padding: "8px 12px", background: "#fff8e1", border: "1px solid #D7B343", borderLeft: "3px solid #D7B343", borderRadius: 3, fontSize: 12, color: "#141414" }}><strong>Immediately escalate to 911 for:</strong> Medical emergencies · Fire or evacuation · Criminal activity or threats · Situations beyond officer control</div>
          </div>)}
          {section("04", "Emergency Response Orders", <div>
            {[["4.1 Medical Emergencies", ["Call emergency services immediately", "Notify supervisor", "Render first aid/CPR only if trained", "Document the incident"]],
              ["4.2 Fire / Evacuation", ["Activate alarm (if applicable)", "Call emergency services", "Assist with evacuation if safe", "Secure area if possible", "Report to assembly point"]],
              ["4.3 Security / Criminal Incidents", ["Observe and report", "Maintain officer safety", "Avoid pursuit unless authorized", "Preserve scene and evidence", "Cooperate with law enforcement"]],
              ["4.4 Suspicious Activity", ["Observe behavior and surroundings", "Avoid confrontation unless required", "Notify supervisor", "Document observations"]]
            ].map(([title, items]) => (
              <div key={title} style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#141414", marginBottom: 4 }}>{title}</div>
                {bul(items)}
              </div>
            ))}
          </div>)}
          {section("05", "Site & Building Information", <div>{row("Buildings / Areas Covered", f.buildingAreas)}{row("Restricted Areas", f.restrictedAreas)}{row("Alarm Panels / Security Systems", f.alarmSystems)}{row("CCTV Monitoring Areas", f.cctvAreas)}{row("Site Address", f.siteAddress)}</div>)}
          {section("06", "Site Address, Map & Legend", <div>
            <div style={{ fontSize: 13, color: "#141414", marginBottom: 8 }}><strong>Address:</strong> {f.siteAddress || "—"}</div>
            <div style={{ fontSize: 13, color: "#939598", marginBottom: 8, fontStyle: "italic" }}>Site Map: Attached / Inserted / Reference Appendix</div>
            <div style={{ display: "flex", gap: 20, fontSize: 12, color: "#141414" }}>
              <span>■ Guard Post</span><span>● Camera</span><span>▲ Alarm Panel</span><span>★ Assembly Point</span>
            </div>
          </div>)}
          {section("07", "Start of Shift Orders", <div>{bul(["Report to post by: " + (f.reportTo || "—"), "Sign in via: " + (f.signIn || "—"), "Receive pass-down from outgoing officer", "Inspect post and equipment", "Test radio / communication devices"])}</div>)}
          {section("08", "Required Equipment", <div><div style={{ fontSize: 13, color: "#141414", whiteSpace: "pre-wrap", lineHeight: 1.7 }}>{f.requiredEquipment}</div></div>)}
          {section("09", "Post Duties & Shift Responsibilities", <div>
            {row("Post Assignment(s)", f.postName)}
            <div style={{ marginBottom: 8 }}>{bul(["Route(s): " + (f.patrolRoutes || "—"), "Frequency: " + (f.patrolFrequency || "—")])}</div>
            {row("Access Control Procedures", f.accessControl)}
            {row("Visitor / Contractor Handling", f.visitorHandling)}
            {row("Reporting Requirements", f.reportingRequirements)}
          </div>)}
          {section("10", "End of Shift Orders", <div>{bul(["Complete required patrols", "Brief incoming officer (if applicable)", "Submit all required reports", "Secure post and equipment", "Sign out properly"])}</div>)}
          {section("11", "Site-Specific Orders & Final Notes", <div>{row("Special Instructions", f.specialInstructions)}{row("Prohibited Actions", f.prohibitedActions)}{row("Additional Notes", f.additionalNotes)}</div>)}
          {section("12", "Contacts – Quick Reference", <div>
            <div style={{ fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", color: "#939598", marginBottom: 6 }}>Citadel Management</div>
            <div style={{ fontSize: 13, color: "#141414", lineHeight: 1.8, marginBottom: 12 }}>Front Range Regional Office: 720-303-3750<br />Office Hours: Mon–Fri 8:00AM–4:00PM<br />1. Skylar Turner, General Manager – 720.661.6401 / 720.539.2955<br />2. Heather Jordan, Assistant General Manager – 720.415.1208<br />3. Brent Jagger, VP of Operations – 970.314.4185</div>
            {f.facilityContacts.some(c => c.name) && <div>
              <div style={{ fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", color: "#939598", marginBottom: 6 }}>Facility Personnel</div>
              <div style={{ fontSize: 13, color: "#141414", lineHeight: 1.8, whiteSpace: "pre-wrap" }}>{contacts}</div>
            </div>}
          </div>)}
          <div style={{ borderTop: "2px solid #D7B343", marginTop: 32, paddingTop: 12, textAlign: "center" }}>
            <div style={{ fontSize: 10, color: "#939598", letterSpacing: "0.08em", textTransform: "uppercase" }}>© Citadel Security Services · Front Range Regional Office · 720.303.3750</div>
          </div>
        </div>
      </div>
    );
  };

  if (preview) return <PreviewDoc />;

  return (
    <div style={{ fontFamily: "Arial, sans-serif", maxWidth: 660, margin: "0 auto", background: "#F5F5F5", minHeight: "100vh" }}>
      <div style={{ background: "#141414", borderBottom: "4px solid #D7B343" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 24px" }}>
          <img src={"data:image/png;base64," + FULL_LOGO} alt="Citadel Security" style={{ height: 36, objectFit: "contain" }} />
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 11, color: "#D7B343", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.12em" }}>Post Orders</div>
            <div style={{ fontSize: 10, color: "#939598", marginTop: 2, letterSpacing: "0.06em" }}>Generator</div>
          </div>
        </div>
      </div>
      <div style={{ display: "flex", background: "#141414", borderBottom: "1px solid #2a2a2a" }}>
        {steps.map((s, i) => (
          <button key={i} onClick={() => setStep(i + 1)} style={{ flex: 1, padding: "11px 4px", border: "none", cursor: "pointer", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", background: step === i + 1 ? "#D7B343" : "transparent", color: step === i + 1 ? "#141414" : "#939598", transition: "all 0.15s" }}>
            {i + 1}. {s}
          </button>
        ))}
      </div>
      <div style={{ background: "#D5D5D5", height: 3 }}>
        <div style={{ background: "#D7B343", height: "100%", width: ((step / 5) * 100) + "%", transition: "width 0.3s ease" }} />
      </div>
      <div style={{ background: "#fff", margin: 20, borderRadius: 6, border: "1px solid #D5D5D5", padding: "24px 24px 16px" }}>
        {stepContent()}
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 24, paddingTop: 16, borderTop: "1px solid #F5F5F5" }}>
          <button onClick={() => setStep(s => Math.max(1, s - 1))} disabled={step === 1} style={{ background: step === 1 ? "#F5F5F5" : "#141414", color: step === 1 ? "#939598" : "#D7B343", border: "none", borderRadius: 4, padding: "10px 20px", cursor: step === 1 ? "default" : "pointer", fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em" }}>
            ← Back
          </button>
          {step < 5
            ? <button onClick={() => setStep(s => s + 1)} style={{ background: "#D7B343", color: "#141414", border: "none", borderRadius: 4, padding: "10px 20px", cursor: "pointer", fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em" }}>Next →</button>
            : <button onClick={() => setPreview(true)} style={{ background: "#D7B343", color: "#141414", border: "none", borderRadius: 4, padding: "10px 22px", cursor: "pointer", fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em" }}>Generate Post Orders →</button>
          }
        </div>
      </div>
      <div style={{ textAlign: "center", padding: "12px 20px 20px" }}>
        <span style={{ fontSize: 10, color: "#939598", letterSpacing: "0.06em" }}>© CITADEL SECURITY SERVICES · FRONT RANGE REGIONAL OFFICE · 720.303.3750</span>
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
